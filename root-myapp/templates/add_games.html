{% extends "base.html" %}
{% block title %}Добавить игру — Booek{% endblock %}
{% block content %}
<div class="content-head">
  <div class="title-wrap"><h1>🎮 Добавить игру</h1><p>Добавь новую игру в медиатеку</p></div>
  <a href="javascript:history.back()" class="btn-secondary">← Назад</a>
</div>
<div class="page-body">
<div class="form-shell">
  <form method="POST" enctype="multipart/form-data">
    <div class="form-block">
      <h2>Основная информация</h2>
      <div class="form-grid">
        <div class="field form-col-full">
          <label>Название <span style="color:var(--danger)">*</span></label>
          <input type="text" name="title" class="input" required placeholder="Введите название игры">
        </div>
        <div class="field">
          <label>Файл обложки</label>
          <input type="file" name="cover_image" class="input" accept="image/*">
        </div>
        <div class="field">
          <label>URL обложки</label>
          <input type="url" name="cover_url" class="input" placeholder="https://example.com/cover.jpg">
        </div>
      </div>
    </div>
    <div class="form-block">
      <h2>Параметры игры</h2>
      <div class="form-grid">
        <div class="field">
          <label>Часов сыграно <span style="color:var(--danger)">*</span></label>
          <input type="number" name="hours" class="input" required min="0" placeholder="0">
        </div>
        <div class="field">
          <label>Статус <span style="color:var(--danger)">*</span></label>
          <select name="status" class="select-input" required>
            <option value="">— Выберите статус —</option>
            <option value="планирую">Планирую</option>
            <option value="играю">Играю</option>
            <option value="прошёл целиком">Прошёл целиком</option>
            <option value="прошёл частично">Прошёл частично</option>
          </select>
        </div>
        <div class="form-col-full">
          <div class="inline-note">💡 Часы учитываются всегда, независимо от статуса</div>
        </div>
      </div>
    </div>
    <div class="form-block">
      <h2>Дополнительно</h2>
      <div class="form-grid">
        <div class="field">
          <label>Источник (ссылка)</label>
          <input type="url" name="source_url" class="input" placeholder="https://...">
        </div>
        <div class="field form-col-full">
          <label>Заметки</label>
          <textarea name="notes" class="textarea-input" placeholder="Твои впечатления…"></textarea>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Добавить игру</button>
      <a href="javascript:history.back()" class="btn-secondary">Отмена</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
