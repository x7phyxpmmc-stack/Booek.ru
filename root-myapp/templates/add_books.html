{% extends "base.html" %}

{% block title %}Добавить книгу - Media Tracker{% endblock %}

{% block content %}

<div class="section-header">
  <h1>Добавить книгу</h1>
  <p>Добавь новую книгу в свою библиотеку</p>
</div>

<div class="form-container">
  <form method="POST" enctype="multipart/form-data" class="form-wrapper">
    
    <!-- ОСНОВНАЯ ИНФОРМАЦИЯ -->
    <div class="form-section">
      <h2>Основная информация</h2>
      
      <div class="form-group">
        <label class="form-label">Название (обязательно)</label>
        <input type="text" name="title" class="form-control" required placeholder="Введите название книги">
      </div>

      <div class="form-group">
        <label class="form-label">Обложка</label>
        <div class="form-input-group">
          <input type="file" name="cover_image" class="form-control" accept="image/*">
          <small style="color: var(--color-text-secondary); display: block; margin-top: 0.5rem;">или укажите URL обложки:</small>
          <input type="url" name="cover_url" class="form-control" placeholder="https://example.com/cover.jpg">
        </div>
      </div>
    </div>

    <!-- ТИП И ПАРАМЕТРЫ КНИГИ -->
    <div class="form-section">
      <h2>Параметры книги</h2>

      <div class="form-group">
        <label class="form-label">Тип книги (обязательно)</label>
        <select name="book_type" class="form-control" required>
          <option value="">-- Выберите тип --</option>
          <option value="бумажная">Бумажная</option>
          <option value="электронная">Электронная</option>
          <option value="аудиокнига">Аудиокнига</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Количество страниц (если нужно)</label>
          <input type="number" name="pages_duration" class="form-control" min="0" placeholder="0">
        </div>

        <div class="form-group">
          <label class="form-label">Статус (обязательно)</label>
          <select name="status" class="form-control" required>
            <option value="">-- Выберите статус --</option>
            <option value="планирую">Планирую</option>
            <option value="читаю">Читаю</option>
            <option value="прочитано">Прочитано</option>
            <option value="не дочитал">Не дочитал</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Часов чтения (обязательно)</label>
          <input type="number" name="hours_reading" class="form-control" required min="0" step="0.1" placeholder="0">
        </div>

        <div class="form-group">
          <label class="form-label">Повторные прочтения</label>
          <input type="number" name="rerereads" class="form-control" min="0" value="0" placeholder="0">
        </div>
      </div>

      <div id="incomplete-section" style="display: none;">
        <div class="form-group">
          <label class="form-label">Прочитано страниц</label>
          <input type="number" name="pages_read" class="form-control" min="0" placeholder="0">
        </div>
      </div>
    </div>

    <!-- ДОПОЛНИТЕЛЬНО -->
    <div class="form-section">
      <h2>Дополнительно</h2>

      <div class="form-group">
        <label class="form-label">Источник (ссылка на книгу)</label>
        <input type="url" name="source_url" class="form-control" placeholder="https://...">
      </div>

      <div class="form-group">
        <label class="form-label">Заметки</label>
        <textarea name="notes" class="form-control" rows="3" placeholder="Напишите ваши впечатления..."></textarea>
      </div>
    </div>

    <!-- КНОПКИ -->
    <div class="form-actions">
      <button type="submit" class="btn btn-primary btn-lg">Добавить</button>
      <a href="javascript:history.back()" class="btn btn-secondary btn-lg">Отмена</a>
    </div>
  </form>
</div>

<style>
  .form-container {
    max-width: 700px;
    margin: 0 auto;
  }

  .form-wrapper {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 2rem;
  }

  .form-section {
    margin-bottom: 2.5rem;
  }

  .form-section h2 {
    font-size: 1.25rem;
    margin-bottom: 1.5rem;
    color: var(--color-text);
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--color-border);
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    display: block;
    margin-bottom: 0.75rem;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--color-text);
  }

  .form-control {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    background: var(--color-background);
    color: var(--color-text);
    font-size: 0.95rem;
    transition: all var(--duration-fast) var(--ease-standard);
  }

  .form-control:hover {
    border-color: var(--color-primary);
  }

  .form-control:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.2);
  }

  textarea.form-control {
    resize: vertical;
    font-family: var(--font-family-base);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .form-wrapper {
    padding: 1.5rem;
  }

  .form-input-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .form-input-group .form-control {
    margin: 0;
  }

  .form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--color-border);
  }

  .form-actions .btn {
    flex: 1;
  }

  @media (max-width: 600px) {
    .form-row {
      grid-template-columns: 1fr;
    }

    .form-wrapper {
      padding: 1.5rem;
    }
  }

  @media (max-width: 480px) {
    .form-actions {
      flex-direction: column;
    }
  }
</style>

<script>
  const statusSelect = document.querySelector('select[name="status"]');
  const incompleteSection = document.getElementById('incomplete-section');

  function updateIncompleteFields() {
    if (statusSelect.value === 'не дочитал') {
      incompleteSection.style.display = 'block';
    } else {
      incompleteSection.style.display = 'none';
    }
  }

  statusSelect.addEventListener('change', updateIncompleteFields);
  updateIncompleteFields();
</script>

{% endblock %}
